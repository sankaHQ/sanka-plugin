interface:
  display_name: "Update Bill"
  short_description: "Update bill in live Sanka."
  default_prompt: "Use $sanka:update-bill to update bill in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
