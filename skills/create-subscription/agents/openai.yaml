interface:
  display_name: "Create Subscription"
  short_description: "Create subscription in live Sanka."
  default_prompt: "Use $sanka:create-subscription to create subscription in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
