interface:
  display_name: "Prospect Companies"
  short_description: "Research and discover net-new companies with live Sanka prospecting."
  default_prompt: "Use $sanka:prospect-companies to research and discover net-new companies with live Sanka prospecting."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
