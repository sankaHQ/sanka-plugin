interface:
  display_name: "Update Ticket Status"
  short_description: "Update ticket status in live Sanka."
  default_prompt: "Use $sanka:update-ticket-status to update ticket status in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
