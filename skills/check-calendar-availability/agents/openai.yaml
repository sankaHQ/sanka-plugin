interface:
  display_name: "Check Calendar Availability"
  short_description: "Check calendar availability in live Sanka."
  default_prompt: "Use $sanka:check-calendar-availability to check calendar availability in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
