interface:
  display_name: "Upload Import File"
  short_description: "Upload an import file into live Sanka."
  default_prompt: "Use $sanka:upload-import-file to upload an import file into live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
