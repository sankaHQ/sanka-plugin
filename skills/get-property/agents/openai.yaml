interface:
  display_name: "Get Property"
  short_description: "Load one property from live Sanka."
  default_prompt: "Use $sanka:get-property to load one property from live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
