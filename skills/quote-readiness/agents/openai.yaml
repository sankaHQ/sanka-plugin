interface:
  display_name: "Quote Readiness"
  short_description: "Check whether a Salesforce Opportunity is ready for governed quote creation using Sanka readiness and approval data."
  default_prompt: "Use $sanka:quote-readiness to check whether a Salesforce Opportunity is ready for governed quote creation using Sanka readiness and approval data."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
