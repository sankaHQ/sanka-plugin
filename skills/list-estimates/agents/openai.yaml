interface:
  display_name: "List Estimates"
  short_description: "List or search estimates in live Sanka."
  default_prompt: "Use $sanka:list-estimates to list or search estimates in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
