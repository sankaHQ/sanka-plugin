interface:
  display_name: "Sync Private Messages"
  short_description: "Sync the authenticated user's private inbox in live Sanka."
  default_prompt: "Use $sanka:sync-private-messages to sync the authenticated user's private inbox in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
