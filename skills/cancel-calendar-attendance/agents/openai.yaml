interface:
  display_name: "Cancel Calendar Attendance"
  short_description: "Cancel calendar attendance in live Sanka."
  default_prompt: "Use $sanka:cancel-calendar-attendance to cancel calendar attendance in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
