interface:
  display_name: "Download Invoice PDF"
  short_description: "Download invoice PDF from live Sanka."
  default_prompt: "Use $sanka:download-invoice-pdf to download invoice PDF from live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
