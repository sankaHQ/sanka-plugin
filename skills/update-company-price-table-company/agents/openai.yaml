interface:
  display_name: "Update Company Price Table Company Settings"
  short_description: "Update company-wide price table settings in live Sanka."
  default_prompt: "Use $sanka:update-company-price-table-company to update company-wide price table settings in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
