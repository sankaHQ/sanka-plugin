interface:
  display_name: "List Integration Channels"
  short_description: "List exportable integration channels in live Sanka."
  default_prompt: "Use $sanka:list-integration-channels to list exportable integration channels in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
