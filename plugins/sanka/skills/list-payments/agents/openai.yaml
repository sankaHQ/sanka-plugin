interface:
  display_name: "List Payments"
  short_description: "List or search payments in live Sanka."
  default_prompt: "Use $sanka:list-payments to list or search payments in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
