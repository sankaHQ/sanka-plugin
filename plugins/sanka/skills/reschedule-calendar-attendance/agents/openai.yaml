interface:
  display_name: "Reschedule Calendar Attendance"
  short_description: "Reschedule calendar attendance in live Sanka."
  default_prompt: "Use $sanka:reschedule-calendar-attendance to reschedule calendar attendance in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
