interface:
  display_name: "Create Calendar Attendance"
  short_description: "Create calendar attendance in live Sanka."
  default_prompt: "Use $sanka:create-calendar-attendance to create calendar attendance in live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sanka_plugin"
      description: "Hosted Sanka MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
