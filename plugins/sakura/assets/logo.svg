<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sakura by Sanka">
<rect width="1200" height="1200" rx="200" fill="#FFF4EF"/>
<svg x="200" y="190" width="800" height="800" viewBox="0 0 512 512">
  <defs>
    <!-- One sakura petal pointing up from the flower center (0,0):
         rounded lobes with a small tip notch, tapering to the center. -->
    <path id="petal"
      d="M 0 -140
         C -6 -150 -18 -156 -32 -150
         C -60 -138 -66 -92 -44 -52
         C -28 -22 -12 -6 0 0
         C 12 -6 28 -22 44 -52
         C 66 -92 60 -138 32 -150
         C 18 -156 6 -150 0 -140 Z" />
    <radialGradient id="chestGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9E2" stop-opacity="1" />
      <stop offset="55%" stop-color="#FFD8D1" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#FFD8D1" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- ── Body ── -->
  <g>
    <!-- resting arm (viewer left), tucked beside the torso -->
    <rect x="136" y="314" width="52" height="104" rx="26" fill="#F4908E"
      transform="rotate(14 163 367)" />
    <!-- legs -->
    <rect x="186" y="408" width="64" height="54" rx="20" fill="#F4908E" />
    <rect x="262" y="408" width="64" height="54" rx="20" fill="#F4908E" />
    <!-- torso -->
    <rect x="158" y="266" width="196" height="170" rx="40" fill="#F4908E" />
    <!-- chest emblem -->
    <circle cx="256" cy="372" r="54" fill="url(#chestGlow)" />
    <g transform="translate(256 369) scale(0.26)" fill="#FFF4EE">
      <use href="#petal" />
      <use href="#petal" transform="rotate(72)" />
      <use href="#petal" transform="rotate(144)" />
      <use href="#petal" transform="rotate(216)" />
      <use href="#petal" transform="rotate(288)" />
    </g>
    <g stroke="#F3A3A0" stroke-width="3" stroke-linecap="round" fill="#F3A3A0">
      <path d="M 256 369 L 256 353" fill="none" /><circle cx="256" cy="351" r="3" />
      <path d="M 256 369 L 269 361" fill="none" /><circle cx="271" cy="360" r="3" />
      <path d="M 256 369 L 243 361" fill="none" /><circle cx="241" cy="360" r="3" />
      <path d="M 256 369 L 264 383" fill="none" /><circle cx="265" cy="385" r="3" />
      <path d="M 256 369 L 248 383" fill="none" /><circle cx="247" cy="385" r="3" />
    </g>
  </g>

  <!-- ── Flower head ── -->
  <g transform="translate(256 172)">
    <g fill="#F4908E">
      <use href="#petal" />
      <use href="#petal" transform="rotate(72)" />
      <use href="#petal" transform="rotate(144)" />
      <use href="#petal" transform="rotate(216)" />
      <use href="#petal" transform="rotate(288)" />
    </g>
    <!-- fill the star-shaped gap behind the face so it stays pink -->
    <circle cx="0" cy="24" r="84" fill="#F4908E" />
    <!-- face plate -->
    <rect x="-81" y="-12" width="162" height="96" rx="30" fill="#FBEDE3" />
    <!-- eyes -->
    <rect x="-50" y="12" width="32" height="34" rx="9" fill="#2E2323" />
    <rect x="18" y="12" width="32" height="34" rx="9" fill="#2E2323" />
    <!-- smile -->
    <path d="M -10 58 Q 0 66 10 58" fill="none" stroke="#EC9C99" stroke-width="5.5" stroke-linecap="round" />
  </g>

  <!-- waving arm (viewer right), in front of the lower-right petal -->
  <rect x="338" y="274" width="138" height="50" rx="25" fill="#F4908E"
    transform="rotate(-48 350 300)" />
</svg>
</svg>
