interface:
  display_name: "Generate Demo Workspace"
  short_description: "Seed a demo workspace in Sanka."
  default_prompt: "Use $sanka:generate-demo-workspace to seed a demo workspace in Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sakura"
      description: "Hosted Sakura MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
