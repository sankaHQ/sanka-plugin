interface:
  display_name: "Deal To Order Handoff"
  short_description: "Preview or create a Sanka order draft and fulfillment handoff from a closed-won HubSpot Deal."
  default_prompt: "Use $sanka:deal-to-order-handoff to preview or create a Sanka order draft and fulfillment handoff from a closed-won HubSpot Deal."

dependencies:
  tools:
    - type: "mcp"
      value: "sakura"
      description: "Hosted Sakura MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
