interface:
  display_name: "Get Order"
  short_description: "Load one order from live Sanka."
  default_prompt: "Use $sanka:get-order to load one order from live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sakura"
      description: "Hosted Sakura MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
