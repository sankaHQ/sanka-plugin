interface:
  display_name: "Refresh Sakura plugin"
  short_description: "Refresh or reinstall the local Sakura plugin so newly shipped Sanka skills and hosted MCP tools are available."
  default_prompt: "Use $sanka:refresh to refresh or reinstall the local Sakura plugin so newly shipped Sanka skills and hosted MCP tools are available."

dependencies:
  tools:
    - type: "mcp"
      value: "sakura"
      description: "Hosted Sakura MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
