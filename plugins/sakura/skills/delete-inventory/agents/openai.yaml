interface:
  display_name: "Delete Inventory"
  short_description: "Delete inventory from live Sanka."
  default_prompt: "Use $sanka:delete-inventory to delete inventory from live Sanka."

dependencies:
  tools:
    - type: "mcp"
      value: "sakura"
      description: "Hosted Sakura MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
