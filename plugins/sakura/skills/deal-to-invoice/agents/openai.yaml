interface:
  display_name: "Deal To Invoice"
  short_description: "Create or preview a Sanka invoice draft workflow from a Sanka deal or HubSpot deal URL."
  default_prompt: "Use $sanka:deal-to-invoice to create or preview a Sanka invoice draft workflow from a Sanka deal or HubSpot deal URL."

dependencies:
  tools:
    - type: "mcp"
      value: "sakura"
      description: "Hosted Sakura MCP server for live Sanka workflows"
      transport: "streamable_http"
      url: "https://mcp.sanka.com/mcp"

policy:
  allow_implicit_invocation: false
